<!DOCTYPE html>
<html>
<head>
    <title>Online Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .calculator {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        .calculator input[type="text"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1.2em;
        }
        .calculator .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #e9e9e9;
            border-radius: 4px;
            font-size: 1.5em;
            font-weight: bold;
        }
        .calculator .error {
            color: red;
            margin-top: 10px;
        }
        .calculator button {
            width: calc(25% - 10px);
            padding: 15px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }
        .calculator button.operator {
            background-color: #ff9800;
        }
        .calculator button.clear {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Online Calculator</h1>
        <form action="/calculate" method="post">
            <input type="text" name="expression" value="{{ expression if expression else '' }}" placeholder="Enter expression" readonly id="display">
            <div class="keypad">
                <button type="button" onclick="appendToDisplay('7')">7</button>
                <button type="button" onclick="appendToDisplay('8')">8</button>
                <button type="button" onclick="appendToDisplay('9')">9</button>
                <button type="button" class="operator" onclick="appendToDisplay('/')">/</button>

                <button type="button" onclick="appendToDisplay('4')">4</button>
                <button type="button" onclick="appendToDisplay('5')">5</button>
                <button type="button" onclick="appendToDisplay('6')">6</button>
                <button type="button" class="operator" onclick="appendToDisplay('*')">*</button>

                <button type="button" onclick="appendToDisplay('1')">1</button>
                <button type="button" onclick="appendToDisplay('2')">2</button>
                <button type="button" onclick="appendToDisplay('3')">3</button>
                <button type="button" class="operator" onclick="appendToDisplay('-')">-</button>

                <button type="button" onclick="appendToDisplay('0')">0</button>
                <button type="button" onclick="appendToDisplay('.')">.</button>
                <button type="submit">=</button>
                <button type="button" class="operator" onclick="appendToDisplay('+')">+</button>

                <button type="button" class="clear" onclick="clearDisplay()">C</button>
            </div>
            {% if result is defined %}
                <div class="result">Result: {{ result }}</div>
            {% endif %}
            {% if error is defined %}
                <div class="error">Error: {{ error }}</div>
            {% endif %}
        </form>
    </div>

    <script>
        function appendToDisplay(value) {
            document.getElementById('display').value += value;
        }

        function clearDisplay() {
            document.getElementById('display').value = '';
        }
    </script>
</body>
</html>
