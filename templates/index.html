<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .calculator {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .display {
            background: #0d0d15;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 2.5em;
            color: #00ff88;
            font-weight: 600;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .btn {
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            background: #2d2d44;
            color: #ccc;
            transition: all 0.15s ease;
            border: 1px solid #3d3d54;
        }
        
        .btn:hover {
            background: #3d3d54;
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-operator {
            background: #ff9800;
            color: #fff;
        }
        
        .btn-operator:hover {
            background: #ffaa33;
        }
        
        .btn-equals {
            background: #4caf50;
            color: #fff;
        }
        
        .btn-equals:hover {
            background: #66bb6a;
        }
        
        .btn-clear {
            background: #f44336;
            color: #fff;
        }
        
        .btn-clear:hover {
            background: #ef5350;
        }
        
        .btn-delete {
            background: #ff6f00;
            color: #fff;
        }
        
        .btn-delete:hover {
            background: #ff8c00;
        }
        
        .error-msg {
            color: #ff6b6b;
            margin-top: 12px;
            padding: 10px;
            background: rgba(220, 50, 50, 0.1);
            border: 1px solid #ff5555;
            border-radius: 8px;
            font-size: 0.9em;
            text-align: center;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        @media (max-width: 480px) {
            .calculator {
                max-width: 100%;
                padding: 16px;
            }
            
            .display {
                font-size: 2em;
                padding: 16px;
            }
            
            .btn {
                padding: 14px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        
        <form id="calcForm" method="post" action="/calculate" onsubmit="return handleSubmit(event)">
            <input type="hidden" name="expression" id="expression">
            
            <div class="keypad">
                <!-- Row 1: Clear, Delete, Divide, Multiply -->
                <button type="button" class="btn btn-clear" onclick="clearDisplay()">AC</button>
                <button type="button" class="btn btn-delete" onclick="deleteLastChar()">DEL</button>
                <button type="button" class="btn btn-operator" onclick="appendChar('/')">÷</button>
                <button type="button" class="btn btn-operator" onclick="appendChar('*')">×</button>
                
                <!-- Row 2: 7, 8, 9, Subtract -->
                <button type="button" class="btn" onclick="appendChar('7')">7</button>
                <button type="button" class="btn" onclick="appendChar('8')">8</button>
                <button type="button" class="btn" onclick="appendChar('9')">9</button>
                <button type="button" class="btn btn-operator" onclick="appendChar('-')">−</button>
                
                <!-- Row 3: 4, 5, 6, Add -->
                <button type="button" class="btn" onclick="appendChar('4')">4</button>
                <button type="button" class="btn" onclick="appendChar('5')">5</button>
                <button type="button" class="btn" onclick="appendChar('6')">6</button>
                <button type="button" class="btn btn-operator" onclick="appendChar('+')">+</button>
                
                <!-- Row 4: 1, 2, 3, Equals -->
                <button type="button" class="btn" onclick="appendChar('1')">1</button>
                <button type="button" class="btn" onclick="appendChar('2')">2</button>
                <button type="button" class="btn" onclick="appendChar('3')">3</button>
                <button type="submit" class="btn btn-equals">=</button>
                
                <!-- Row 5: 0 (wide), Decimal -->
                <button type="button" class="btn" onclick="appendChar('0')" style="grid-column: 1 / 3;">0</button>
                <button type="button" class="btn" onclick="appendChar('.')">.</button>
            </div>
            
            <div class="error-msg" id="error"></div>
        </form>
    </div>
    
    <script>
        let display = '0';
        
        function updateDisplay() {
            document.getElementById('display').textContent = display || '0';
        }
        
        function appendChar(char) {
            clearError();
            if (display === '0' && char !== '.') {
                display = char;
            } else if (char === '.' && display.includes('.')) {
                return;
            } else {
                display += char;
            }
            updateDisplay();
        }
        
        function deleteLastChar() {
            clearError();
            display = display.slice(0, -1) || '0';
            updateDisplay();
        }
        
        function clearDisplay() {
            display = '0';
            clearError();
            updateDisplay();
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 4000);
        }
        
        function clearError() {
            const errorDiv = document.getElementById('error');
            errorDiv.classList.remove('show');
        }
        
        function handleSubmit(event) {
            event.preventDefault();
            
            // Validate expression
            if (!display || display === '0' || /[+\-*/.]$/.test(display) || /^[+*/.]/.test(display)) {
                showError('Invalid expression');
                return false;
            }
            
            // Send to backend
            document.getElementById('expression').value = display;
            
            fetch('/calculate', {
                method: 'POST',
                body: new FormData(document.getElementById('calcForm'))
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    display = String(data.result);
                    updateDisplay();
                }
            })
            .catch(err => {
                showError('Calculation error');
            });
            
            return false;
        }
        
        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (/\d/.test(e.key)) appendChar(e.key);
            else if (e.key === '.') appendChar('.');
            else if (e.key === '+' || e.key === '-') appendChar(e.key);
            else if (e.key === '*') appendChar('*');
            else if (e.key === '/') { e.preventDefault(); appendChar('/'); }
            else if (e.key === 'Enter') handleSubmit(new Event('submit'));
            else if (e.key === 'Backspace') { e.preventDefault(); deleteLastChar(); }
            else if (e.key === 'Escape') clearDisplay();
        });
        
        updateDisplay();
    </script>
</body>
</html>
