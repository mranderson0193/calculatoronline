name: Deploy to Azure Container App

on:
  push:
    branches:
      - main

env:
  AZURE_CONTAINER_REGISTRY: myflaskacr007.azurecr.io # Replace with your ACR name
  CONTAINER_APP_NAME: my-flask-calculator-app     # Replace with your Container App name
  RESOURCE_GROUP: my-flask-rg                 # Replace with your resource group name
  IMAGE_NAME: flask-calculator                # Name of your Docker image

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
        # For admin user, you can also use AZURE_CREDENTIALS
      # username: ${{ secrets.AZURE_CREDENTIALS.clientId }}
      # password: ${{ secrets.AZURE_CREDENTIALS.clientSecret }}

    - name: Build and push Docker image
      run: |
        docker build . -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Deploy to Azure Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        azureCredentials: ${{ secrets.AZURE_CREDENTIALS }}
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        targetPort: 80
